# explore_lite configuration
# This node finds "frontiers" (borders between free and unknown space) on the map 
# and sends goals to move_base to explore them.

# We use the move_base global costmap because it already includes the SLAM map
# and provides a large stable 40x40m window that always covers the robot.
robot_base_frame: base_link
costmap_topic: /move_base/global_costmap/costmap
costmap_updates_topic: /move_base/global_costmap/costmap_updates
visualize: true

planner_frequency: 0.33
progress_timeout: 30.0
potential_scale: 3.0
orientation_scale: 0.0
gain_scale: 1.0
transform_tolerance: 0.5
min_frontier_size: 0.5