DWAPlannerROS:
  # --- 1. Кинематические ограничения (СИНХРОНИЗИРОВАНО с Improved DWA) ---
  max_vel_x: 1.0       # Было 0.8 -> Стало 1.0
  min_vel_x: 0.0
  
  max_vel_trans: 1.0   # Должно совпадать с max_vel_x
  min_vel_trans: 0.1   # Минимальная скорость, чтобы робот не "дрожал"
  
  max_vel_theta: 3.14  # Было 1.5 -> Стало 3.14 (Робот теперь может вращаться быстрее)
  min_vel_theta: 0.2   # Мин. скорость вращения
  
  acc_lim_x: 2.0       # Было 2.5 -> Стало 2.0 (Снизили, как в Improved)
  acc_lim_theta: 2.0   # Было 6.5 -> Стало 2.0 (Снизили, как в Improved)
  acc_lim_trans: 2.0   # Совпадает с acc_lim_x

  # --- 2. Параметры симуляции траекторий (СИНХРОНИЗИРОВАНО) ---
  sim_time: 2.5        # Было 2.0 -> Стало 2.5 (Важное изменение, робот смотрит дальше)
  
  vx_samples: 20       # Совпадает с вашим конфигом
  vth_samples: 40      # Было 45 -> Стало 30 (Меньше вариантов, легче процессору)
  
  # Шаг симуляции в метрах (при 1.0 м/с и dt 0.1 это 0.1м, ставим 0.05 для точности)
  sim_granularity: 0.05 

  # --- 3. Весовые коэффициенты (Подгонка поведения) ---
  # Мы стараемся имитировать ваши веса (Low Path adherence, High Safety)
  
  # Аналог alpha (0.13) - ставим низко, чтобы робот мог отклоняться от пути
  path_distance_bias: 0.6      
  
  # Аналог gamma (0.14) - приоритет цели
  goal_distance_bias: 0.5      
  
  # Аналог beta (10.5) - страх препятствий.
  # В стандартном DWA это число работает иначе, 0.05 - это уже достаточно "пугливый" робот.
  # Если поставить больше (например 0.5), стандартный DWA может вообще перестать ехать в узких местах.
  occdist_scale: 0.05           
  
  forward_point_distance: 0.325
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.2

  publish_traj_pc: true
  publish_cost_grid_pc: true

  # --- 4. Достижение цели (СИНХРОНИЗИРОВАНО) ---
  xy_goal_tolerance: 0.35   # Как в Improved
  yaw_goal_tolerance: 0.5   # Как в Improved
  latch_xy_goal_tolerance: true
  trans_stopped_vel: 0.1
  theta_stopped_vel: 0.1