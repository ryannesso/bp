# Параметры для ImprovedDWALocalPlanner (на основе статьи Qin et al. 2022)

# Имя плагина, используется как пространство имен (namespace)
ImprovedDWALocalPlanner:

  # --- Весовые коэффициенты оценочной функции ---
  # Формула: alpha*(path+heading) + beta*static + gamma*vel + epsilon*safety - approach_pen - rotation_cost*w²
  alpha: 3.2         # Следование глобальному пути (path_dist + heading)
  beta: 3.5          # Избегание СТАТИЧЕСКИХ препятствий (costmap dist)
  gamma: 8.2        # Поддержание крейсерской скорости
  kappa: 0.0         # НЕ ИСПОЛЬЗУЕТСЯ (оставлен для совместимости, был для dis_hv)
  epsilon: 10.5      # Безопасная дистанция до ДИНАМИЧЕСКИХ препятствий (dis_fp ∈ [0,1])

  # Штраф за угловую скорость: score -= rotation_cost * w²
  # Меньше → робот готов активнее поворачивать
  # Больше → робот предпочитает прямолинейное движение
  rotation_cost: 0.15

  # Множитель штрафа за скорость сближения препятствия с роботом
  # Применяется к скалярному произведению их векторов скоростей
  approach_penalty_weight: 2.0

  # Горизонт времени, на который робот "заглядывает" вперед để обнаружить коридор столкновения (в секундах)
  # Позволяет распознать угрозу до того, как она войдет в базовый predict_time (2.5с)
  corridor_predict_time: 4.5

  # Минимальная скорость, при которой робот считается идущим "напролом" сквозь коридор (м/с)
  corridor_cruising_speed: 0.5

  # Запас времени (с) для того, чтобы робот успел проскочить перекресток до того как туда приедет объект
  # Если он проезжает перекресток на safe_crossing_margin секунд раньше объекта, штраф не накладывается
  safe_crossing_margin: 0.8

  # --- Ограничения движения робота ---
  max_vel_x: 1.0     # Макс. линейная скорость, м/с
  min_vel_x: -0.35   # Мин. линейная скорость, м/с
  max_vel_th: 3.14   # Макс. угловая скорость, рад/с
  
  acc_lim_x: 2.0     # Макс. линейное ускорение, м/с²
  acc_lim_th: 2.0    # Макс. угловое ускорение, рад/с²

  # --- Параметры симуляции траекторий ---
  predict_time: 2.5  # На сколько секунд вперед симулировать движение
  dt: 0.1            # Шаг времени для симуляции, с
  vx_samples: 20     # Количество проверяемых линейных скоростей
  vth_samples: 40    # Количество проверяемых угловых скоростей
  
  # --- Параметры достижения цели ---
  xy_goal_tolerance: 0.4   # Допустимая ошибка по расстоянию до цели, м
  yaw_goal_tolerance: 6.28  # Допустимая ошибка по углу (6.28 рад ≈ 360°)
  trans_stopped_vel: 0.1    # Порог скорости, ниже которого робот считается остановившимся
  rot_stopped_vel: 0.1      # Порог угловой скорости для остановки

  # --- Параметры дистанции и безопасности (динамические препятствия) ---
  robot_radius: 0.3              # Приблизительный радиус робота, м
  safe_clearance_dist: 0.3       # Желаемый безопасный зазор (поддерживаемая дистанция), м
  hard_collision_buffer: 0.1     # Жесткий буфер до препятствия (критическая зона), м
  radar_range: 4.0               # Дистанция активации штрафа за сближение
  safety_multiplier_unstable: 1.2 # Увеличение зоны для непредсказуемых объектов
  safety_multiplier_ghost: 1.1    # Увеличение зоны для "призраков" (потерянных объектов)
  safety_multiplier_ghost_unstable: 1.1 # Максимальное увеличение зоны (призрак + нестабильность)

  # --- Память и прогнозирование препятствий ---
  obstacle_memory_duration: 0.5   # Время удержания объекта в памяти (секунды)
  prediction_horizon: 1.5         # Горизонт предиктивной фильтрации (секунды)