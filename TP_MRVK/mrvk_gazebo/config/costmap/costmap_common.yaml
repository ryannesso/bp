obstacle_range: 3.5
raytrace_range: 4.0
footprint: [[0.3, 0.25], [-0.3, 0.25], [-0.3, -0.25], [0.3, -0.25]]
robot_radius: 0.3
resolution: 0.05
transform_tolerance: 1.0

# --- Настройки слоев ---
# --- Слой Лидара (LIDAR) ---
obstacle_layer:
  observation_sources: laser_scan_sensor
  laser_scan_sensor: {
    data_type: LaserScan,
    topic: /scan_cleaned, 
    sensor_frame: sensor_laser_link,
    marking: true,
    clearing: true,
    footprint_clearing_enabled: true 
  }
  obstacle_range: 3.5
  raytrace_range: 4.2

# --- Слой Травы (Camera) ---
grass_layer:
  observation_sources: grass_cloud
  grass_cloud: {
    sensor_frame: base_link, 
    data_type: PointCloud2, 
    topic: /path_detector/grass_cloud, 
    marking: true, 
    clearing: true, 
    observation_persistence: 1.0,
    min_obstacle_height: -2.0, 
    max_obstacle_height: 2.0
  }
  obstacle_range: 3.5
  raytrace_range: 4.2

road_layer:
  enabled: true
  map_topic: /path_detector/costmap
  subscribe_to_updates: true
  track_unknown_space: true
  transform_tolerance: 1.0

# --- Настройки инфляции ---
inflation_layer:
  inflation_radius: 0.75
