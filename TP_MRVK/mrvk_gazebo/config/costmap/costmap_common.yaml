obstacle_range: 3.5
raytrace_range: 4.0
footprint: [[0.3, 0.25], [-0.3, 0.25], [-0.3, -0.25], [0.3, -0.25]]
robot_radius: 0.3

resolution: 0.05
transform_tolerance: 0.2

observation_sources: laser_scan_sensor
laser_scan_sensor: {sensor_frame: sensor_laser_link, data_type: LaserScan, topic: /scan, marking: true, clearing: true}
# --- Настройки слоя препятствий (Obstacle Layer) ---
obstacle_layer:
  observation_sources: laser_scan_sensor
  laser_scan_sensor: {
    data_type: LaserScan,
    topic: /scan_cleaned, # <-- СНОВА СЛУШАЕМ "ГРЯЗНЫЙ" /scan
    sensor_frame: sensor_laser_link,
    marking: true,
    clearing: true,
    # Эта опция говорит costmap очищать пространство внутри контура робота
    footprint_clearing_enabled: true 
  }
  obstacle_range: 3.5
  raytrace_range: 4.2
  observation_persistence: 0.0

# --- Настройки инфляции ---
inflation_layer:
  inflation_radius: 0.75
