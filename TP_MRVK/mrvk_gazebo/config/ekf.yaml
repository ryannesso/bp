frequency: 50
two_d_mode: true
publish_tf: true     # ВАЖНО: EKF будет чинить дерево трансформаций

# Фреймы
map_frame: map
odom_frame: odom
base_link_frame: base_link
world_frame: odom

# === ИСТОЧНИК 1: КОЛЕСА (Сырая одометрия) ===
odom0: /shoddy/odom 
odom0_config: [false, false, false,
               false, false, false,
               true,  false, false,  # vx (скорость вперед)
               false, false, true,   # vyaw (скорость поворота)
               false, false, false]
odom0_differential: false
odom0_relative: false

# === ИСТОЧНИК 2: ГИРОСКОП И АКСЕЛЕРОМЕТР (IMU) ===
imu0: /imu/data 
imu0_config: [false, false, false,
              false, false, false,  # Отключаем абсолютный Yaw (ориентацию)
              false, false, false,
              false, false, true,   # vYaw (Скорость поворота) — берем с гироскопа
              false, false, false]  # ВЫКЛЮЧИЛИ ax (Линейное ускорение) — убираем скачки

imu0_differential: false
imu0_relative: true
imu0_remove_gravitational_acceleration: true # Чтобы гравитация не сбивала акселерометр